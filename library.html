<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamTogether — Movie Library</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E50914;
    --red-dark: #b20710;
    --red-glow: rgba(229,9,20,0.18);
    --black: #000;
    --dark: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.16);
    --text: #ffffff;
    --muted: #888888;
    --muted2: #555555;
    --imdb-gold: #f5c518;
    --topbar-h: 54px;
  }

  html, body { min-height: 100%; background: var(--black); color: var(--text); font-family: 'DM Sans', sans-serif; }

  /* TOP BAR */
  .topbar {
    height: var(--topbar-h);
    background: rgba(10,10,10,0.98);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 2rem;
    gap: 1.5rem;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }
  .logo-sm { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--red); text-decoration: none; letter-spacing: 0.04em; white-space: nowrap; }
  .logo-sm span { color: #fff; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 0.8rem; }

  /* Source toggle */
  .source-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .source-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .source-btn.active { background: var(--red); color: #fff; }

  /* MAIN CONTAINER */
  .library-container { max-width: 1400px; margin: 0 auto; padding: calc(var(--topbar-h) + 2rem) 2rem 3rem 2rem; }

  /* HEADER */
  .library-header { margin-bottom: 2.5rem; text-align: center; }
  .library-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 0.03em; margin-bottom: 0.5rem; }
  .library-header p { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }

  .search-wrapper { max-width: 600px; margin: 0 auto; display: flex; gap: 0.6rem; }
  .search-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border-hover); border-radius: 8px;
    padding: 0.85rem 1.2rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus { border-color: var(--red); box-shadow: 0 0 12px var(--red-glow); }
  .search-input::placeholder { color: var(--muted2); }
  .btn-search {
    background: var(--red); border: none; border-radius: 8px; color: #fff; padding: 0 1.8rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-search:hover { background: var(--red-dark); transform: scale(1.02); }

  /* GENRE FILTERS */
  .genre-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; justify-content: center; }
  .genre-pill {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    color: var(--muted); font-size: 0.78rem; font-weight: 500; padding: 0.35rem 0.9rem;
    cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .genre-pill:hover, .genre-pill.active { background: var(--red); color: #fff; border-color: var(--red); }

  /* GRID */
  .grid-section-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.05em;
    margin-bottom: 1.2rem; color: var(--text); border-left: 3px solid var(--red); padding-left: 0.6rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .grid-loader { font-size: 0.8rem; color: var(--muted); font-family: 'DM Sans', sans-serif; font-weight: 400; letter-spacing: 0; }

  .movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1.8rem;
    margin-bottom: 3rem;
  }

  /* MOVIE CARD */
  .movie-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.2,0.8,0.2,1), border-color 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column; position: relative;
  }
  .movie-card:hover { transform: translateY(-8px); border-color: var(--border-hover); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
  .movie-card.loading-streams { opacity: 0.7; pointer-events: none; }

  .poster-wrap { position: relative; aspect-ratio: 2/3; width: 100%; background: var(--surface2); overflow: hidden; }
  .poster-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
  .movie-card:hover .poster-img { transform: scale(1.05); }

  /* Format badge */
  .format-badge {
    position: absolute; top: 8px; right: 8px;
    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em;
    padding: 2px 7px; border-radius: 4px;
    backdrop-filter: blur(4px);
  }
  .format-badge.mp4  { background: rgba(15,157,88,0.85); border: 1px solid rgba(15,157,88,0.6); color: #fff; }
  .format-badge.mkv  { background: rgba(229,9,20,0.85);  border: 1px solid rgba(229,9,20,0.6);  color: #fff; }
  .format-badge.webm { background: rgba(26,115,232,0.85); border: 1px solid rgba(26,115,232,0.6); color: #fff; }
  .format-badge.loading { background: rgba(0,0,0,0.6); border: 1px solid var(--border-hover); color: var(--muted); }
  .format-badge.none { background: rgba(0,0,0,0.6); border: 1px solid var(--border-hover); color: var(--muted2); }

  .card-overlay-btn {
    position: absolute; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s ease;
  }
  .movie-card:hover .card-overlay-btn { opacity: 1; }
  .play-badge {
    background: var(--red); color: #fff; font-size: 0.8rem; font-weight: 600;
    padding: 0.5rem 1rem; border-radius: 20px;
    transform: translateY(10px); transition: transform 0.2s ease;
  }
  .movie-card:hover .play-badge { transform: translateY(0); }

  /* Stream picker modal */
  .stream-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .stream-modal-overlay.open { opacity: 1; pointer-events: all; }
  .stream-modal {
    background: var(--surface); border: 1px solid var(--border-hover);
    border-radius: 14px; padding: 1.8rem; width: 100%; max-width: 520px;
    max-height: 80vh; overflow-y: auto;
    transform: scale(0.95); transition: transform 0.2s;
  }
  .stream-modal-overlay.open .stream-modal { transform: scale(1); }
  .stream-modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.04em; margin-bottom: 0.3rem; }
  .stream-modal-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.2rem; }
  .stream-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .stream-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.8rem 1rem;
    display: flex; align-items: center; gap: 0.8rem;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
  }
  .stream-item:hover { border-color: var(--red); background: rgba(229,9,20,0.06); }
  .stream-fmt {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
    padding: 2px 7px; border-radius: 4px; flex-shrink: 0;
  }
  .stream-fmt.mp4  { background: rgba(15,157,88,0.2);  color: #4caf50; border: 1px solid rgba(15,157,88,0.3); }
  .stream-fmt.mkv  { background: rgba(229,9,20,0.2);   color: #ff6b6b; border: 1px solid rgba(229,9,20,0.3); }
  .stream-fmt.webm { background: rgba(26,115,232,0.2); color: #64b5f6; border: 1px solid rgba(26,115,232,0.3); }
  .stream-fmt.other { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }
  .stream-info { flex: 1; min-width: 0; }
  .stream-name { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stream-meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }
  .stream-quality {
    font-size: 0.7rem; font-weight: 600; color: var(--imdb-gold);
    background: rgba(245,197,24,0.1); border: 1px solid rgba(245,197,24,0.2);
    padding: 1px 6px; border-radius: 4px; flex-shrink: 0;
  }
  .stream-play-btn {
    background: var(--red); border: none; border-radius: 6px;
    color: #fff; font-size: 0.75rem; font-weight: 600;
    padding: 0.35rem 0.8rem; cursor: pointer; flex-shrink: 0;
    transition: background 0.15s;
  }
  .stream-play-btn:hover { background: var(--red-dark); }
  /* Stream item with potential audio issues */
  .stream-item-warn { border-color: rgba(229,9,20,0.2) !important; }
  .stream-item-warn:hover { border-color: rgba(229,9,20,0.5) !important; }
  .stream-modal-close {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); padding: 0.6rem 1rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    cursor: pointer; width: 100%; margin-top: 1rem;
    transition: color 0.15s;
  }
  .stream-modal-close:hover { color: var(--text); }

  .movie-details { padding: 0.9rem; display: flex; flex-direction: column; flex: 1; }
  .movie-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.3rem; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .movie-meta-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-top: auto; }
  .movie-rating { display: flex; align-items: center; gap: 0.25rem; color: var(--text); font-weight: 500; }
  .rating-star { color: var(--imdb-gold); }

  /* Status/skeleton */
  .status-message { grid-column: 1/-1; text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.95rem; }
  .skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .skeleton-poster { aspect-ratio: 2/3; background: linear-gradient(90deg, var(--surface2) 25%, #222 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  .skeleton-details { padding: 0.9rem; }
  .skeleton-line { height: 12px; background: var(--surface2); border-radius: 4px; margin-bottom: 0.5rem; animation: shimmer 1.5s infinite; }
  .skeleton-line.short { width: 60%; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* Local movies section */
  .local-section { margin-bottom: 3rem; }
  .local-add-btn {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--surface); border: 1px dashed var(--border-hover);
    border-radius: 10px; color: var(--muted); padding: 1rem;
    cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    aspect-ratio: 2/3; flex-direction: column; justify-content: center;
    text-align: center; transition: border-color 0.2s, color 0.2s;
  }
  .local-add-btn:hover { border-color: var(--red); color: var(--text); }

  @media (max-width: 768px) {
    .topbar { padding: 0 1rem; }
    .library-container { padding: calc(var(--topbar-h) + 1.5rem) 1rem 2rem 1rem; }
    .library-header h1 { font-size: 2.3rem; }
    .movies-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
    .movie-title { font-size: 0.82rem; }
    .movie-details { padding: 0.6rem; }
    .source-btn span { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="logo-sm" href="index.html">Stream<span>Together</span></a>
  <div class="topbar-right">
    <div class="source-toggle">
      <button class="source-btn active" data-source="stremio">🌐 <span>Stremio</span></button>
      <button class="source-btn" data-source="local">📁 <span>Local</span></button>
    </div>
  </div>
</div>

<div class="library-container">
  <div class="library-header">
    <h1>Movie Library</h1>
    <p id="librarySubtitle">Browse millions of movies — powered by Cinemeta & Torrentio</p>
    <div class="search-wrapper">
      <input type="text" class="search-input" id="librarySearchInput" placeholder="Search movies..." autocomplete="off">
      <button class="btn-search" id="searchBtn">Search</button>
    </div>
  </div>

  <!-- Genre filters (Stremio mode) -->
  <!-- Content type toggle -->
  <div style="display:flex;justify-content:center;gap:0.5rem;margin-bottom:1rem;">
    <button class="genre-pill active" id="typeMovies" onclick="setContentType('movie')">🎬 Movies</button>
    <button class="genre-pill" id="typeSeries" onclick="setContentType('series')">📺 Series</button>
  </div>

  <div class="genre-filters" id="genreFilters">
    <button class="genre-pill active" data-genre="">All</button>
    <button class="genre-pill" data-genre="action">💥 Action</button>
    <button class="genre-pill" data-genre="comedy">😂 Comedy</button>
    <button class="genre-pill" data-genre="drama">🎭 Drama</button>
    <button class="genre-pill" data-genre="horror">😱 Horror</button>
    <button class="genre-pill" data-genre="scifi">🚀 Sci-Fi</button>
    <button class="genre-pill" data-genre="romance">❤️ Romance</button>
    <button class="genre-pill" data-genre="thriller">🕵️ Thriller</button>
    <button class="genre-pill" data-genre="animation">🎨 Animation</button>
  </div>

  <!-- Episode picker modal (for series) -->
  <div class="stream-modal-overlay" id="episodeModal">
    <div class="stream-modal">
      <h3 id="episodeModalTitle">Select Episode</h3>
      <p class="stream-modal-sub" id="episodeModalSub">Choose a season and episode</p>
      <div style="display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;" id="seasonTabs"></div>
      <div class="stream-list" id="episodeList"></div>
      <button class="stream-modal-close" id="episodeModalClose">Cancel</button>
    </div>
  </div>

  <h2 class="grid-section-title" id="gridTitle">
    Popular Now
    <span class="grid-loader" id="gridLoader"></span>
  </h2>
  <div class="movies-grid" id="moviesGrid"></div>
</div>

<!-- Stream picker modal -->
<div class="stream-modal-overlay" id="streamModal">
  <div class="stream-modal">
    <h3 id="streamModalTitle">Pick a Stream</h3>
    <p class="stream-modal-sub" id="streamModalSub">Choose a quality. Green = MP4 (plays in browser). Red = MKV (needs conversion).</p>
    <div class="stream-list" id="streamList"></div>
    <button class="stream-modal-close" id="streamModalClose">Cancel</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
    CONFIG
══════════════════════════════════════════════ */
const CINEMETA_BASE  = 'https://v3-cinemeta.strem.io';

// Your local movies — add entries here whenever you put a file in /movies/
const LOCAL_MOVIES = [
  {
    title: 'Call of My Life',
    year: 2024,
    rating: 8.0,
    poster: 'posters/sample-mp4.jpg',
    file: 'movies/callofmylife.mp4'
  }
  // Add more:
  // { title: 'Movie Name', year: 2023, rating: 7.5, poster: 'posters/name.jpg', file: 'movies/name.mp4' }
];

/* ══════════════════════════════════════════════
    STATE
══════════════════════════════════════════════ */
let currentSource  = 'stremio'; // 'stremio' | 'local'
let currentGenre   = '';
let currentSearch  = '';
let selectedMovie  = null;
let contentType    = 'movie'; // 'movie' | 'series'

const moviesGrid    = document.getElementById('moviesGrid');
const searchInput   = document.getElementById('librarySearchInput');
const gridTitle     = document.getElementById('gridTitle').childNodes[0];
const gridLoader    = document.getElementById('gridLoader');
const streamModal   = document.getElementById('streamModal');
const streamList    = document.getElementById('streamList');

/* ══════════════════════════════════════════════
    SOURCE TOGGLE
══════════════════════════════════════════════ */
document.querySelectorAll('.source-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSource = btn.dataset.source;
    currentSearch = '';
    searchInput.value = '';
    document.getElementById('genreFilters').style.display = currentSource === 'stremio' ? 'flex' : 'none';
    document.getElementById('librarySubtitle').textContent = currentSource === 'stremio'
      ? 'Browse millions of movies — powered by Cinemeta & Torrentio'
      : 'Your locally saved movies';
    if (currentSource === 'stremio') loadStremio();
    else renderLocalMovies();
  });
});

/* ══════════════════════════════════════════════
    GENRE PILLS
══════════════════════════════════════════════ */
document.querySelectorAll('.genre-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    currentGenre  = pill.dataset.genre;
    currentSearch = '';
    searchInput.value = '';
    loadStremio();
  });
});

/* ══════════════════════════════════════════════
    SEARCH
══════════════════════════════════════════════ */
document.getElementById('searchBtn').addEventListener('click', doSearch);
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
searchInput.addEventListener('input',   () => { if (!searchInput.value.trim()) { currentSearch = ''; if (currentSource === 'stremio') loadStremio(); else renderLocalMovies(); } });

function doSearch() {
  currentSearch = searchInput.value.trim();
  if (!currentSearch) return;
  if (currentSource === 'stremio') searchCinemeta(currentSearch);
  else {
    const q = currentSearch.toLowerCase();
    renderCards(LOCAL_MOVIES.filter(m => m.title.toLowerCase().includes(q)), 'local');
  }
}

/* ══════════════════════════════════════════════
    CINEMETA — fetch movie catalogue
══════════════════════════════════════════════ */
/* ── Content type toggle ── */
function setContentType(type) {
  contentType = type;
  currentGenre  = '';
  currentSearch = '';
  searchInput.value = '';
  document.querySelectorAll('.genre-pill[data-genre]').forEach(p => p.classList.remove('active'));
  document.querySelector('.genre-pill[data-genre=""]').classList.add('active');
  document.getElementById('typeMovies').classList.toggle('active', type === 'movie');
  document.getElementById('typeSeries').classList.toggle('active', type === 'series');
  const typeLabel = type === 'movie' ? 'Movies' : 'Series';
  document.getElementById('librarySubtitle').textContent =
    `Browse ${typeLabel} — powered by Cinemeta`;
  loadStremio();
}

async function loadStremio() {
  setLoading(true);
  const typeLabel = contentType === 'series' ? 'Series' : 'Movies';
  gridTitle.textContent = currentGenre
    ? `${capitaliseGenre(currentGenre)} ${typeLabel}`
    : `Popular ${typeLabel}`;

  try {
    let url;
    const catalogType = contentType === 'series' ? 'series' : 'movie';
    if (currentGenre) {
      url = `${CINEMETA_BASE}/catalog/${catalogType}/top/genre=${encodeURIComponent(capitaliseGenre(currentGenre))}.json`;
    } else {
      url = `${CINEMETA_BASE}/catalog/${catalogType}/top.json`;
    }
    const res  = await fetch(url);
    const data = await res.json();
    renderCards(data.metas || [], 'stremio');
  } catch (e) {
    console.error('Cinemeta fetch failed:', e);
    showError('Could not load content — check your internet connection.');
  }
  setLoading(false);
}

async function searchCinemeta(query) {
  setLoading(true);
  gridTitle.textContent = `Results for "${query}"`;
  try {
    const catalogType = contentType === 'series' ? 'series' : 'movie';
    const url  = `${CINEMETA_BASE}/catalog/${catalogType}/top/search=${encodeURIComponent(query)}.json`;
    const res  = await fetch(url);
    const data = await res.json();
    renderCards(data.metas || [], 'stremio');
  } catch (e) {
    showError('Search failed — try again.');
  }
  setLoading(false);
}

function capitaliseGenre(g) {
  const map = { scifi: 'Sci-Fi', action: 'Action', comedy: 'Comedy', drama: 'Drama', horror: 'Horror', romance: 'Romance', thriller: 'Thriller', animation: 'Animation' };
  return map[g] || g.charAt(0).toUpperCase() + g.slice(1);
}

/* ══════════════════════════════════════════════
    RENDER CARDS
══════════════════════════════════════════════ */
function renderCards(movies, source) {
  moviesGrid.innerHTML = '';

  if (!movies || movies.length === 0) {
    moviesGrid.innerHTML = `<div class="status-message">No movies found. Try a different search or genre.</div>`;
    return;
  }

  movies.slice(0, 60).forEach(movie => {
    const card = document.createElement('div');
    card.className = 'movie-card';

    if (source === 'stremio') {
      const poster  = movie.poster || movie.background || '';
      const title   = escapeHTML(movie.name || movie.title || 'Unknown');
      const year    = movie.year || movie.releaseInfo || '';
      const rating  = movie.imdbRating ? parseFloat(movie.imdbRating).toFixed(1) : (movie.rating ? parseFloat(movie.rating).toFixed(1) : 'N/A');

      card.innerHTML = `
        <div class="poster-wrap">
          <img class="poster-img" src="${escapeHTML(poster)}" alt="${title}" loading="lazy" onerror="this.src='${FALLBACK_POSTER}'">
          <span class="format-badge loading" id="fmt_${movie.id}">…</span>
          <div class="card-overlay-btn"><span class="play-badge">▶ Watch</span></div>
        </div>

/* Fetch streams from a single source safely — never throws */
async function fetchFromSource(url, sourceName) {
  try {
    const controller = new AbortController();
    const timeout    = setTimeout(() => controller.abort(), 10000); // 10s timeout
    const res  = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    if (!res.ok) return [];
    const data = await res.json();
    const streams = (data.streams || []).map(s => ({ ...s, _source: sourceName }));
    console.log(`[${sourceName}] ${streams.length} streams found`);
    return streams;
  } catch (e) {
    console.warn(`[${sourceName}] Failed:`, e.message);
    return [];
  }
}

/* ── TMDB ID lookup — VidSrc scraper needs TMDB IDs not IMDb IDs ── */

async function getTmdbId(imdbId, mediaType) {
  if (tmdbIdCache[imdbId]) return tmdbIdCache[imdbId];
  try {
    const res  = await fetch(
      `https://api.themoviedb.org/3/find/${imdbId}?external_source=imdb_id`,
      { headers: { 'Authorization': `Bearer ${TMDB_KEY}`, 'Content-Type': 'application/json' } }
    );

    const arr  = mediaType === 'series' ? (data.tv_results || []) : (data.movie_results || []);
    const id   = arr[0]?.id;
    if (id) tmdbIdCache[imdbId] = id;

/* Fetch HLS streams from VidSrc scraper */
async function fetchFromVidSrc(imdbId, mediaType, season, episode) {
  try {
    const tmdbId = await getTmdbId(imdbId, mediaType);
    if (!tmdbId) { console.warn('[VidSrc] No TMDB ID for', imdbId); return []; }

    const type = mediaType === 'series' ? 'tv' : 'movie';
    let url = `${VIDSRC_SCRAPER}/extract?tmdb_id=${tmdbId}&type=${type}`;
    if (season)  url += `&season=${season}`;
    if (episode) url += `&episode=${episode}`;

    const controller = new AbortController();
    const timeout    = setTimeout(() => controller.abort(), 30000);
    const res  = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    if (!res.ok) return [];

    const data = await res.json();
    if (!data.success || !data.results) return [];

    const streams = [];
    for (const [domain, result] of Object.entries(data.results)) {
      if (result.hls_url && !result.error) {
        streams.push({
          name:       `VidSrc (${domain.replace('https://', '')})`,
          title:      `HLS • ${domain.replace('https://', '')}`,
          url:        result.hls_url,
          _source:    'vidsrc',
          _isHLS:     true,
          _subtitles: result.subtitles || []
        });
      }
    }
    console.log(`[VidSrc] ${streams.length} HLS streams for ${imdbId}`);
    return streams;
  } catch(e) {
    console.warn('[VidSrc] Failed:', e.message);
    return [];
  }
}

/* Torrentio-only movie fetch — capped to 480p/720p small files */
async function fetchAllStreams(imdbId) {
  if (streamCache[imdbId]) return streamCache[imdbId];

  console.log(`[Streams] Fetching Torrentio (480p/720p) for ${imdbId}…`);

  // Routed through /api/torrentio to dodge Torrentio's missing CORS header.
  const torrentioStreams = await fetchFromSource(
    `/api/torrentio?path=${encodeURIComponent(`${TORRENTIO_CFG}/stream/movie/${imdbId}.json`)}`,
    'torrentio'
  );

  // De-dupe by infoHash/url
  const seen   = new Set();
  const merged = [];
  for (const stream of torrentioStreams) {
    const key = stream.infoHash || stream.url || (stream.name + (stream.title || ''));
    if (!key || seen.has(key)) continue;
    seen.add(key);
    merged.push(stream);
  }

  console.log(`[Streams] Total: ${merged.length} (Torrentio 480p/720p)`);

  streamCache[imdbId] = merged;
  return merged;
}

/* ── Stream name parsing helpers ── */

/* ── Stream parsing helpers ──
   Torrentio packs ALL detail into stream.description (multiline):
   Line 1: full torrent filename  e.g. "Movie.2024.2160p.BluRay.DTS.x265-GROUP"
   Line 2: emoji meta            e.g. "💾 28.6 GB · 👤 45 · ⚙️ zurg"
   stream.name is the SHORT label e.g. "Torrentio 4k DV | HDR"
   We parse BOTH to get the full picture.
*/

/* Get the full detail string — prefer description, fall back to title */
function getFullDetail(stream) {
  // Concatenate ALL fields — codec/audio info can be in any of them
  // depending on which addon returned the stream
  return [
    stream.description || '',
    stream.title || '',
    stream.name || '',
    stream.behaviorHints?.filename || '',
    stream.behaviorHints?.bingeGroup || ''
  ].join(' ').toUpperCase();
}

/* Get display name — use name for the heading, description line 1 as subtitle */
function getStreamDisplayName(stream) {
  const name = stream.name || '';
  // description line 1 is usually the full torrent filename
  const descLines = (stream.description || stream.title || '').split('\n').map(l => l.trim()).filter(Boolean);
  const filename  = descLines[0] || '';
  return { name, filename };
}

/* Parse format from full detail string */
function getMagnetFmt(stream) {
  const full = getFullDetail(stream) + (stream.behaviorHints?.filename || '').toUpperCase();
  if (full.includes('.MP4')  || full.includes('MP4'))  return 'mp4';
  if (full.includes('.WEBM') || full.includes('WEBM')) return 'webm';
  if (full.includes('.MKV')  || full.includes('MKV'))  return 'mkv';
  if (full.includes('.AVI')  || full.includes('AVI'))  return 'mkv';
  return 'mkv';
}

/* Parse quality from name or full detail */
function getQualityLabel(stream) {
  const full = (stream.name || '') + ' ' + getFullDetail(stream);
  const match = full.match(/4K|2160[Pp]|1080[Pp]|720[Pp]|480[Pp]|360[Pp]/i);
  return match ? match[0].toUpperCase().replace('P','p') : '';
}

/* Quality rank for sorting */
function getQualityRank(stream) {
  const q = getQualityLabel(stream).toUpperCase();
  const ranks = { '4K': 5, '2160P': 5, '1080P': 4, '720P': 3, '480P': 2, '360P': 1 };
  return ranks[q] || 2;
}

/* Parse video codec from full detail string */
function getVideoCodec(stream) {
  const full = getFullDetail(stream);
  if (full.includes('X265') || full.includes('X.265') ||
      full.includes('H265') || full.includes('H.265') ||
      full.includes('HEVC')) return { label: 'x265', safe: false };
  if (full.includes('X264') || full.includes('X.264') ||
      full.includes('H264') || full.includes('H.264') ||
      full.includes('AVC'))  return { label: 'x264', safe: true };
  if (full.includes('AV1'))  return { label: 'AV1',  safe: false }; // limited support
  if (full.includes('VP9'))  return { label: 'VP9',  safe: true };
  if (full.includes('XVID') || full.includes('DIVX')) return { label: 'XviD', safe: false };
  return { label: '', safe: true }; // unknown — assume safe
}

/* Parse audio codec from full detail string */
function getAudioInfo(stream) {
  const full = getFullDetail(stream);
  if (full.includes('TRUEHD'))  return { label: 'TrueHD', ok: true };
  if (full.includes('ATMOS'))   return { label: 'Atmos',  ok: true };
  if (full.includes('EAC3') || full.includes('E-AC3')) return { label: 'EAC3', ok: true };
  if (full.includes('DTS-HD') || full.includes('DTSHD')) return { label: 'DTS-HD', ok: true };
  if (full.includes('DTS'))     return { label: 'DTS',    ok: true };
  if (full.includes('AC3') || full.includes('DD5.1') || full.includes('DD 5'))
                                return { label: 'AC3',    ok: true };
  if (full.includes('AAC'))     return { label: 'AAC',    ok: true };
  if (full.includes('MP3'))     return { label: 'MP3',    ok: true };
  if (full.includes('FLAC'))    return { label: 'FLAC',   ok: true };
  if (full.includes('OPUS'))    return { label: 'Opus',   ok: true };
  if (full.includes('MUTED') || full.includes('NO AUDIO') || full.includes('SILENT'))
                                return { label: '🔇 No Audio', ok: false };
  // CAM rips — bad or no audio. Catch all CAM variants
  if (full.includes('CAMRIP') || full.includes('HDCAM') || full.includes('CAM.X') ||
      full.includes('CAM-') || full.includes('.CAM.') || full.includes(' CAM ') ||
      full.match(/\bCAM\b/))
                                return { label: '⚠️ CAM', ok: false };
  return { label: '', ok: true };
}

/* Parse file size — check stream.size first (bytes), then parse from description */
function getSizeInfo(stream) {
  if (stream.size && stream.size > 0) return formatBytes(stream.size);
  // Parse from description/title — Torrentio format: "💾 28.6 GB" or "28.6 GB"
  const desc = stream.description || stream.title || '';
  const match = desc.match(/(\d+\.?\d*)\s*(GB|MB)/i);
  if (match) return `${match[1]} ${match[2].toUpperCase()}`;
  return '';
}

/* Parse seeder count from description — "👤 45" */
function getSeederInfo(stream) {
  if (stream.seeders) return stream.seeders;
  const desc = stream.description || stream.title || '';
  const match = desc.match(/👤\s*(\d+)/);
  return match ? parseInt(match[1]) : 0;
}

/* Get streamable URL */
function getStreamUrl(stream) {
  if (stream.url) return stream.url;
  if (stream.infoHash) return `magnet:?xt=urn:btih:${stream.infoHash}`;
  return null;
}

/* Fetch best format badge for a movie card (lightweight — only checks) */
async function fetchBestFormat(imdbId) {
  if (!imdbId) return;
  try {
    const url    = `${TORRENTIO_BASE}/stream/movie/${imdbId}.json`;
    const res    = await fetch(url, { signal: AbortSignal.timeout(6000) });
    const data   = await res.json();
    const streams = data.streams || [];

    let fmt = 'none';
    if (streams.length > 0) {
      const has1080 = streams.some(s => getQualityLabel(s) === '1080P');
      const has4k   = streams.some(s => getQualityLabel(s) === '4K');
      fmt = has4k ? '4k' : has1080 ? '1080p' : 'sd';
    }

    streamCache[imdbId] = streams.map(s => ({ ...s, _source: 'torrentio' }));

    const badge = document.getElementById('fmt_' + imdbId);
    if (badge) {
      if (fmt === 'none') {
        badge.textContent = 'N/A'; badge.className = 'format-badge none';
      } else if (fmt === '4k') {
        badge.textContent = '4K'; badge.className = 'format-badge mp4';
      } else if (fmt === '1080p') {
        badge.textContent = 'HD'; badge.className = 'format-badge mp4';
      } else {
        badge.textContent = 'SD'; badge.className = 'format-badge mkv';
      }
    }
  } catch (e) {
    const badge = document.getElementById('fmt_' + imdbId);
    if (badge) { badge.textContent = '?'; badge.className = 'format-badge none'; }
  }
}

/* Reusable stream item renderer — used by both movies and series */
function renderStreamItems(streams, movie) {
    // Step 1 — Filter out garbage streams:
    // - No audio (CAM rips, muted, silent)
    // - No streamable URL
    // - Likely trailers/samples (very small files under 100MB)
    // - Scene/sample releases with keywords indicating no full movie
    const filtered = streams.filter(stream => {
      const audio = getAudioInfo(stream);
      if (!audio.ok) return false; // remove no-audio streams

      const url = getStreamUrl(stream);
      if (!url) return false; // must have a URL

      // Filter out tiny files that are likely trailers/samples
      const size = stream.size || 0;
      if (size > 0 && size < 100 * 1024 * 1024) return false; // under 100MB

      // Filter out streams with keywords suggesting no actual movie.
      // Use getFullDetail so we check ALL fields (name + title + description +
      // filename + bingeGroup) — codec/keyword info can live in any of them.
      const full = getFullDetail(stream);
      const badKeywords = ['TRAILER', 'SAMPLE', 'FEATURETTE', 'DELETED SCENE', 'EXTRAS', 'BONUS', 'BEHIND THE SCENES'];
      if (badKeywords.some(k => full.includes(k))) return false;

      // ONLY allow x264/H.264/AVC streams — guaranteed to play on
      // every device and browser without GPU hardware decoding.
      // x265/HEVC/AV1/VP9/XviD/DivX all cause black screen on mobile/low-end devices.
      // full already includes ALL fields (name+title+description+filename) uppercased.
      const isX264 = full.includes('X264') || full.includes('X.264') ||
                     full.includes('H264') || full.includes('H.264') ||
                     full.includes('AVC');
      const hasCodecInfo = full.includes('X264') || full.includes('X265') ||
                           full.includes('H264') || full.includes('H265') ||
                           full.includes('HEVC') || full.includes('AVC')  ||
                           full.includes('AV1')  || full.includes('VP9')  ||
                           full.includes('XVID') || full.includes('DIVX') ||
                           full.includes('MPEG2')|| full.includes('MPEG4');
      // If codec info is present in ANY field, it must be x264/H.264/AVC.
      // Streams with no codec info at all (e.g. Nuvio direct HTTP) pass through.
      if (hasCodecInfo && !isX264) return false;

      // ── LOW-END GUARD — keep only mobile-friendly streams ──
      // Torrentio's qualityfilter isn't fully reliable (3D/mislabeled remuxes
      // leak through), so we enforce quality + size client-side as the real
      // guarantee. Only 480p/720p, and hard-cap size so giant "720p" remuxes
      // don't slip in. Torrent/RD streams have a size; direct-HTTP (no size)
      // streams pass through untouched.
      const quality = getQualityLabel(stream); // '', '480P', '720P', '1080P', '4K'...
      if (quality && !['480P', '720P'].includes(quality)) return false; // block 1080p/4K
      if (size > 0 && size > 2.5 * 1024 * 1024 * 1024) return false;     // cap at 2.5 GB

      return true;
    });

    if (filtered.length === 0) {
      streamList.innerHTML = `
        <div class="status-message">
          No compatible low-end streams found.<br>
          <span style="font-size:0.8rem;color:var(--muted2)">
            No small 480p/720p x264 release for this title.<br>
            Try a different movie or episode.
          </span>
        </div>`;
      return;
    }

    // Step 2 — Sort smallest to biggest file size
    // Unknown size goes to the end
    const sorted = [...filtered].sort((a, b) => {
      const sizeA = a.size || Infinity;
      const sizeB = b.size || Infinity;
      return sizeA - sizeB;
    });

    sorted.slice(0, 30).forEach(stream => {
      const fmt         = getMagnetFmt(stream);
      const quality     = getQualityLabel(stream);
      const audio       = getAudioInfo(stream);
      const sizeLabel   = getSizeInfo(stream);
      const seeders     = getSeederInfo(stream);
      const source      = SOURCE_LABELS[stream._source] || { label: stream._source, color: '#888' };
      const { name, filename } = getStreamDisplayName(stream);
      const displayName = name || 'Unknown source';
      const streamUrl   = getStreamUrl(stream);

      if (!streamUrl) return;

      // Build badge row: size + video codec + audio + seeders + source
      const videoCodec = getVideoCodec(stream);
      const badges = [];
      if (sizeLabel) badges.push(
        `<span style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);border-radius:4px;padding:1px 7px;font-size:0.65rem;font-weight:700;color:#ddd;">💾 ${escapeHTML(sizeLabel)}</span>`
      );
      if (videoCodec.label) badges.push(
        `<span style="background:${videoCodec.safe ? 'rgba(34,197,94,0.1)' : 'rgba(229,9,20,0.15)'};border:1px solid ${videoCodec.safe ? 'rgba(34,197,94,0.25)' : 'rgba(229,9,20,0.4)'};border-radius:4px;padding:1px 7px;font-size:0.65rem;font-weight:700;color:${videoCodec.safe ? '#4ade80' : '#ff6b6b'};" title="${videoCodec.safe ? 'Plays on all devices' : 'May show black screen on mobile/low-end devices'}">${escapeHTML(videoCodec.label)}</span>`
      );
      if (audio.label) badges.push(
        `<span style="background:${audio.ok ? 'rgba(255,255,255,0.06)' : 'rgba(229,9,20,0.15)'};border:1px solid ${audio.ok ? 'rgba(255,255,255,0.12)' : 'rgba(229,9,20,0.4)'};border-radius:4px;padding:1px 7px;font-size:0.65rem;font-weight:700;color:${audio.ok ? '#aaa' : '#ff6b6b'};">${escapeHTML(audio.label)}</span>`
      );
      if (seeders) badges.push(
        `<span style="color:var(--muted);font-size:0.65rem;">👥 ${seeders}</span>`
      );
      badges.push(
        `<span style="color:${source.color};font-weight:600;font-size:0.65rem;">${escapeHTML(source.label)}</span>`
      );

      const item = document.createElement('div');
      item.className = 'stream-item' + (!audio.ok ? ' stream-item-warn' : '');
      item.innerHTML = `
        <span class="stream-fmt ${fmt}">${fmt.toUpperCase()}</span>
        <div class="stream-info">
          <div class="stream-name">${escapeHTML(displayName)}</div>
          ${filename && filename !== displayName
            ? `<div style="font-size:0.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;">${escapeHTML(filename)}</div>`
            : ''}
          <div class="stream-meta" style="display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap;margin-top:0.25rem;">
            ${badges.join('')}
          </div>
        </div>
        ${quality ? `<span class="stream-quality">${quality}</span>` : ''}
        <button class="stream-play-btn" data-loading="false">▶ Play</button>
      `;

      const playBtn = item.querySelector('.stream-play-btn');

      async function handleStreamClick(e) {
        e.stopPropagation();
        if (playBtn.dataset.loading === 'true') return;
        playBtn.dataset.loading = 'true';
        streamModal.classList.remove('open');

        try {
          let finalUrl;
          const isNuvio = stream._source === 'nuvio';

          if (isNuvio && streamUrl && streamUrl.startsWith('http')) {
            playBtn.textContent = '⏳ Loading…';
            finalUrl = streamUrl;

          } else if (isMagnet(streamUrl)) {
            playBtn.textContent = '⏳ Trying streams…';

            const allStreams = streamCache[movie.id] || [];
            const allMagnets = allStreams
              .filter(s => s._source !== 'nuvio')
              .map(s => getStreamUrl(s))
              .filter(u => u && isMagnet(u));

            const clickedIdx = allMagnets.indexOf(streamUrl);
            if (clickedIdx > 0) {
              allMagnets.splice(clickedIdx, 1);
              allMagnets.unshift(streamUrl);
            } else if (clickedIdx === -1) {
              allMagnets.unshift(streamUrl);
            }

            console.log(`[RD] Sending ${allMagnets.length} magnets for auto-retry`);
            finalUrl = await resolveWithRetry(allMagnets);

          } else {
            playBtn.textContent = '⏳ Resolving…';
            finalUrl = await resolveStreamUrl(streamUrl);
          }

          if (!finalUrl) throw new Error('No playable URL returned');
          launchRoom(finalUrl, movie.name || movie._fullTitle || movie.title);

        } catch(err) {
          console.error('Stream resolve failed:', err);
          streamModal.classList.add('open');
          playBtn.textContent = '❌ Failed — retry';
          playBtn.dataset.loading = 'false';
          showStreamError(err.exhausted
            ? `All streams blocked by Real-Debrid. Try a Nuvio ✅ stream instead.`
            : err.message
          );
        }
      }

      playBtn.addEventListener('click', handleStreamClick);
      item.addEventListener('click', (e) => { if (e.target !== playBtn) handleStreamClick(e); });
      streamList.appendChild(item);
    });
}

function showStreamError(msg) {
  const existing = document.getElementById('streamErrorMsg');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'streamErrorMsg';
  el.style.cssText = 'color:#ff6b6b;font-size:0.82rem;padding:0.6rem 0;text-align:center;';
  el.textContent = '⚠️ ' + msg;
  streamList.insertBefore(el, streamList.firstChild);
}


document.getElementById('streamModalClose').addEventListener('click', () => streamModal.classList.remove('open'));

/* ══════════════════════════════════════════════
    SERIES — EPISODE PICKER
══════════════════════════════════════════════ */
let selectedSeason = 1;

async function openEpisodePicker(series) {
  selectedMovie = series;
  const episodeModal = document.getElementById('episodeModal');
  document.getElementById('episodeModalTitle').textContent = series.name || series.title;
  document.getElementById('episodeModalSub').textContent = 'Loading episodes…';
  document.getElementById('episodeList').innerHTML = '';
  document.getElementById('seasonTabs').innerHTML = '';
  episodeModal.classList.add('open');

  try {
    // Fetch series metadata from Cinemeta to get seasons/episodes
    const res  = await fetch(`${CINEMETA_BASE}/meta/series/${series.id}.json`);
    const data = await res.json();
    const meta = data.meta;

    if (!meta || !meta.videos || meta.videos.length === 0) {
      document.getElementById('episodeModalSub').textContent = 'No episodes found.';
      return;
    }

    // Group episodes by season — skip specials (season 0) and extras
    const seasons = {};
    meta.videos.forEach(ep => {
      const s = ep.season;
      // Skip season 0 (specials/extras) and episodes without a season number
      if (!s || s === 0) return;
      if (!seasons[s]) seasons[s] = [];
      seasons[s].push(ep);
    });

    // If all episodes got filtered out, include season 0 as a fallback
    if (Object.keys(seasons).length === 0) {
      meta.videos.forEach(ep => {
        const s = ep.season || 1;
        if (!seasons[s]) seasons[s] = [];
        seasons[s].push(ep);
      });
    }

    const seasonNums = Object.keys(seasons).map(Number).sort((a,b) => a-b);
    selectedSeason = seasonNums[0];

    // Build season tabs
    const seasonTabs = document.getElementById('seasonTabs');
    seasonNums.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'genre-pill' + (s === selectedSeason ? ' active' : '');
      btn.textContent = `S${s}`;
      btn.addEventListener('click', () => {
        selectedSeason = s;
        document.querySelectorAll('#seasonTabs .genre-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderEpisodes(seasons[s], series);
      });
      seasonTabs.appendChild(btn);
    });

    document.getElementById('episodeModalSub').textContent =
      `${seasonNums.length} season${seasonNums.length !== 1 ? 's' : ''} · Click an episode to watch`;

    renderEpisodes(seasons[selectedSeason], series);

  } catch(e) {
    console.error('Episode fetch failed:', e);
    document.getElementById('episodeModalSub').textContent = 'Failed to load episodes.';
  }
}

function renderEpisodes(episodes, series) {
  const list = document.getElementById('episodeList');
  list.innerHTML = '';

  episodes.sort((a,b) => (a.episode||0) - (b.episode||0)).forEach(ep => {
    const item = document.createElement('div');
    item.className = 'stream-item';
    item.style.cursor = 'pointer';

    const epNum  = ep.episode || ep.number || ep.id?.split(':')[2] || '?';
    const title  = ep.title || ep.name || `Episode ${epNum}`;
    const aired  = ep.released || ep.firstAired
      ? new Date(ep.released || ep.firstAired).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })
      : '';
    const overview = ep.overview ? ep.overview.slice(0, 80) + (ep.overview.length > 80 ? '…' : '') : '';

    item.innerHTML = `
      <span class="stream-quality" style="min-width:36px;text-align:center;">E${epNum}</span>
      <div class="stream-info">
        <div class="stream-name">${escapeHTML(title)}</div>
        <div class="stream-meta">
          ${aired ? `<span>${aired}</span>` : ''}
          ${overview ? `<span style="display:block;margin-top:2px;color:var(--muted2);font-size:0.68rem;">${escapeHTML(overview)}</span>` : ''}
        </div>
      </div>
      <button class="stream-play-btn">▶ Watch</button>
    `;

    item.querySelector('.stream-play-btn').addEventListener('click', async (e) => {
      e.stopPropagation();
      document.getElementById('episodeModal').classList.remove('open');
      // Open stream picker for this specific episode
      await openSeriesStreamPicker(series, ep.season || selectedSeason, ep.episode || ep.number || parseInt(ep.id?.split(':')[2]) || 1, title);
    });

    item.addEventListener('click', async (e) => {
      if (e.target.classList.contains('stream-play-btn')) return;
      document.getElementById('episodeModal').classList.remove('open');
      await openSeriesStreamPicker(series, ep.season || selectedSeason, ep.episode || ep.number || parseInt(ep.id?.split(':')[2]) || 1, title);
    });

    list.appendChild(item);
  });
}

async function openSeriesStreamPicker(series, season, episode, epTitle) {
  const fullTitle = `${series.name || series.title} S${season}E${episode} — ${epTitle}`;
  const streamId  = `${series.id}:${season}:${episode}`;

  selectedMovie = { ...series, _streamId: streamId, _fullTitle: fullTitle };
  document.getElementById('streamModalTitle').textContent = fullTitle;
  document.getElementById('streamModalSub').textContent = '🔍 Searching 480p/720p streams…';
  streamList.innerHTML = `
    <div style="color:var(--muted);font-size:0.85rem;padding:2rem 0;text-align:center;">
      <div style="margin-bottom:0.5rem;font-size:1.5rem">⏳</div>
      Searching Torrentio (480p/720p)…
    </div>`;
  streamModal.classList.add('open');

  try {
    // Routed through /api/torrentio to dodge Torrentio's missing CORS header.
    const torrentioStreams = await fetchFromSource(
      `/api/torrentio?path=${encodeURIComponent(`${TORRENTIO_CFG}/stream/series/${streamId}.json`)}`,
      'torrentio'
    );

    const seen = new Set();
    const merged = [];
    for (const s of torrentioStreams) {
      const key = s.infoHash || s.url || s.name;
      if (!key || seen.has(key)) continue;
      seen.add(key);
      merged.push(s);
    }

    streamCache[streamId] = merged;

    if (merged.length === 0) {
      streamList.innerHTML = `<div class="status-message">No streams found for this episode.</div>`;
      document.getElementById('streamModalSub').textContent = 'No streams found.';
      return;
    }

    document.getElementById('streamModalSub').textContent =
      `${merged.length} streams found (480p/720p)`;

    renderStreamItems(merged, { ...series, id: streamId, name: fullTitle, _fullTitle: fullTitle });

  } catch(e) {
    streamList.innerHTML = `<div class="status-message">Failed to fetch streams.</div>`;
  }
}

document.getElementById('episodeModalClose').addEventListener('click', () => {
  document.getElementById('episodeModal').classList.remove('open');
});
document.getElementById('episodeModal').addEventListener('click', e => {

/* ══════════════════════════════════════════════
    REAL-DEBRID — convert magnet to direct stream URL
    Real-Debrid caches torrents on their servers and
    returns a direct HTTPS link instantly for popular content.
    API docs: https://api.real-debrid.com
══════════════════════════════════════════════ */
const RD_KEY   = 'AZIOEBYE3PEL4XQF3JIE7NQFSOSINHN3KYCCGIRUQFYOTSOPS3SQ';
const RD_PROXY = '/api/realdebrid';

async function rdProxy(body) {
  const res = await fetch(RD_PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...body, token: RD_KEY })
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `RD proxy error: ${res.status}`);
  return data;
}

// Resolve a single magnet — used when user clicks one specific stream
async function magnetToRealDebrid(magnetLink) {
  const data = await rdProxy({ action: 'resolveMagnet', magnets: [magnetLink] });
  if (!data.download) throw new Error('No download URL returned');
  return data.download;
}

// Resolve using ALL magnets for a movie at once — proxy tries them in order,
// skipping any flagged as infringing_file automatically
async function resolveWithRetry(magnetList) {
  if (!magnetList.length) throw new Error('No magnets to try');
  console.log(`[RD] Sending ${magnetList.length} magnets to proxy for auto-retry…`);
  const data = await rdProxy({ action: 'resolveMagnet', magnets: magnetList });
  if (!data.download) throw new Error(data.error || 'All streams failed');
  console.log(`[RD] ✅ Resolved on attempt ${(data.magnetIndex || 0) + 1}`);
  return data.download;
}

function isMagnet(url) {
  return url && (url.startsWith('magnet:') || url.startsWith('magnet%3A'));
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function resolveStreamUrl(rawUrl) {
  if (!rawUrl) return null;
  if (isMagnet(rawUrl)) {
    return await magnetToRealDebrid(rawUrl);
  }
  if (rawUrl.startsWith('http')) {
    try {
      const data = await rdProxy({ action: 'unrestrict', link: rawUrl });
      if (data.download) return data.download;
    } catch(e) {
      console.warn('[RD] Unrestrict failed, using URL as-is:', e.message);
    }
    return rawUrl;
  }
  return rawUrl;
}

/* ══════════════════════════════════════════════
    LAUNCH ROOM
══════════════════════════════════════════════ */
function launchRoom(streamUrl, title) {
  if (!streamUrl) {
    alert('Could not resolve a playable URL for this stream.');
    return;
  }
  const roomId = 'room_' + Math.random().toString(36).slice(2, 9);
  const url    = `room.html?room=${encodeURIComponent(roomId)}`
               + `&stream=${encodeURIComponent(streamUrl)}`
               + `&title=${encodeURIComponent(title)}`;
  window.location.href = url;
}

  moviesGrid.innerHTML = `<div class="status-message">⚠️ ${escapeHTML(msg)}</div>`;

function escapeHTML(str) {
  return String(str || '').replace(/[&<>'"]/g,
    t => ({ '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;' }[t] || t)
  );
}

function formatBytes(bytes) {
  if (!bytes) return '';
  if (bytes >= 1e9) return (bytes / 1e9).toFixed(1) + ' GB';
  if (bytes >= 1e6) return (bytes / 1e6).toFixed(0) + ' MB';
  return bytes + ' B';
}
